
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress - NeuroSense</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#050d14; --surface:#0a1628; --border:rgba(56,139,253,.15); --accent:#38bdf8; --accent2:#818cf8; --accent3:#34d399; --warn:#fbbf24; --text:#e2eaf7; --muted:#6b8ab0; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
    .wrapper{max-width:1400px;margin:0 auto;padding:32px 24px 80px}
    .loading{text-align:center;padding:4rem;color:var(--muted)}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;margin-bottom:40px;background:rgba(10,22,40,.7);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(12px)}
    .topbar .logo{font-family:'DM Serif Display',serif;font-size:1.5rem;letter-spacing:.02em;color:var(--accent)}
    .topbar .logo span{color:var(--text)}
    .meta-chip{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);background:rgba(56,189,248,.06);border:1px solid var(--border);padding:6px 14px;border-radius:999px}
    .hero{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:32px;padding:40px 48px;background:linear-gradient(135deg, rgba(10,22,40,.9), rgba(15,31,56,.9));border:1px solid var(--border);border-radius:24px;margin-bottom:32px}
    .hero-stat{text-align:center}
    .hero-stat-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .hero-stat-value{font-family:'DM Serif Display',serif;font-size:2.2rem}
    .hero-center{text-align:center}
    .score-number{font-family:'DM Serif Display',serif;font-size:3.2rem;line-height:1;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .score-denom{font-size:1rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
    .status-badge{display:inline-flex;align-items:center;gap:8px;margin-top:12px;padding:8px 20px;border-radius:999px;font-size:.85rem;font-weight:600;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);color:var(--warn)}
    .section-head{display:flex;align-items:center;gap:12px;margin:40px 0 20px}
    .section-head .pill{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.2);padding:4px 12px;border-radius:999px}
    .grid-3x2{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .card{background:rgba(10,22,40,.8);border:1px solid var(--border);border-radius:20px;padding:24px}
    .donut-card{text-align:center;padding:20px 16px}
    .donut-center{position:absolute;text-align:center}
    .donut-score{font-family:'DM Serif Display',serif;font-size:1.6rem}
    .donut-max{font-size:.7rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
    .perf-table{width:100%;border-collapse:collapse}
    .perf-table thead th{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 12px 12px;text-align:left;border-bottom:1px solid var(--border)}
    .perf-table tbody td{padding:12px 12px;font-size:.83rem;border-bottom:1px solid rgba(56,139,253,.06)}
    .no-data{text-align:center;padding:4rem;color:var(--muted);font-size:1.1rem}
    @media(max-width:900px){.grid-3x2{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}.hero{grid-template-columns:1fr}.hero-stat{display:none}}
    @media(max-width:600px){.grid-3x2{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="loading" id="loading">Loading your progress...</div>
    <nav class="topbar" id="topbar" style="display:none">
      <div class="logo">Neuro<span>Sense</span></div>
      <div id="topbar-meta"></div>
    </nav>

    <div id="hero-section" style="display:none">
      <div class="hero">
        <div class="hero-stat">
          <div class="hero-stat-label">Total Games Played</div>
          <div class="hero-stat-value" id="total-games">0</div>
        </div>
        <div class="hero-center">
          <div class="score-ring-wrap">
            <canvas id="heroRing" width="180" height="180"></canvas>
            <div class="score-inner">
              <div class="score-number" id="avg-score">0</div>
              <div class="score-denom">/100</div>
            </div>
          </div>
          <div style="margin-top:10px">
            <span class="status-badge" id="status-badge">Loading...</span>
          </div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-label">Total Score</div>
          <div class="hero-stat-value" id="total-score">0</div>
        </div>
      </div>
    </div>

    <div id="donut-section" style="display:none">
      <div class="section-head">
        <h2>Game Performance</h2>
        <div class="pill">All Categories</div>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      <div class="grid-3x2" id="donut-grid"></div>
    </div>

    <div id="table-section" style="display:none">
      <div class="section-head">
        <h2>Detailed Stats</h2>
        <div class="pill">Your Scores</div>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      <div class="card">
        <table class="perf-table">
          <thead>
            <tr><th>Game</th><th>Best</th><th>Plays</th><th>Avg</th><th>Status</th></tr>
          </thead>
          <tbody id="stats-table"></tbody>
        </table>
      </div>
    </div>

    <div id="no-data-section" style="display:none">
      <div class="no-data">
        <h2>No games played yet</h2>
        <p>Play some games from /dashboard to see your progress here!</p>
        <a href="/dashboard" style="color:var(--accent);text-decoration:none;font-weight:600">→ Start Playing</a>
      </div>
    </div>
  </div>

  <script>
    const LABEL_MAP = {
      // Focus Training
      'attention-anchor':               'Attention Anchor',
      'FocusTraining-DistractionDrift': 'Distraction Drift',
      'FocusTraining-SilentSignal':     'Silent Signal',
      'FocusTraining-Stroop':           'Stroop Game',
      'FocusTraining-TargetLock':       'Target Lock',
      // Logic Puzzles
      'Logic Grid':      'Logic Grid',
      'Pattern Forge':   'Pattern Forge',
      'Reason Path':     'Reason Path',
      'Rule Breaker':    'Rule Breaker',
      'Sequence Solver': 'Sequence Solver',
      // Memory Challenge
      '3 Word Recall':    '3 Word Recall',
      'Echo Recall':      'Echo Recall',
      'Memory Card Game': 'Memory Card Game',
      'Memory Map':       'Memory Map',
      'Story Snapback':   'Story Snapback',
      // Number Sense
      'Math Reflex':     'Math Reflex',
      'Pattern Numbers': 'Pattern Numbers',
      'Quick Count':     'Quick Count',
      'Trail Making':    'Trail Making',
      'Value Shift':     'Value Shift',
      // Speed Processing
      'Flash Respond': 'Flash Respond',
      'Instant Shift': 'Instant Shift',
      'Rapid Choice':  'Rapid Choice',
      'Rule Dash':     'Rule Dash',
      'Speed Sort':    'Speed Sort',
      // Word Games
      'Visual-NameThatObject': 'Visual Recall',
    };

    function capitalizeGame(name){
      if(!name) return '';
      return name.replace(/-/g,' ').replace(/\w/g, c => c.toUpperCase());
    }

    async function loadProgress(){
      try{
        const [progressRes, historyRes] = await Promise.all([
          fetch('/get_progress'),
          fetch('/get_game_history')
        ]);
        if(!progressRes.ok || !historyRes.ok) throw new Error('Fetch failed');
        const {progress} = await progressRes.json();
        const {history} = await historyRes.json();

        if(!history || history.length === 0){
          document.getElementById('loading').style.display='none';
          document.getElementById('no-data-section').style.display='block';
          return;
        }

        // Hero
        const totalGames = history.length;
        const totalScore = history.reduce((s,h)=> s + (h.score||0), 0);
        const avgScore = totalScore / totalGames;
        document.getElementById('total-games').textContent = totalGames;
        document.getElementById('avg-score').textContent = Math.round(avgScore);
        document.getElementById('total-score').textContent = Math.round(totalScore);
        document.getElementById('status-badge').textContent = avgScore > 70 ? '✓ Good' : (avgScore > 50 ? '⚠ Average' : '⚠ Improve');

        // Topbar
        document.getElementById('topbar').style.display='flex';
        document.getElementById('topbar-meta').innerHTML = `
          <div class="meta-chip">Games <strong>${totalGames}</strong></div>
          <div class="meta-chip">Avg Score <strong>${Math.round(avgScore)}</strong></div>
        `;

        // Table
        const tbody = document.getElementById('stats-table');
        tbody.innerHTML='';
        Object.entries(progress || {}).forEach(([game, stats]) => {
          const row = document.createElement('tr');
          const label = LABEL_MAP[game] || capitalizeGame(game);
          const best = Math.round(stats.best_score || 0);
          const plays = stats.total_games || 0;
          const avg = Math.round(stats.average_score || 0);
          const status = avg > 70 ? 'good' : 'improve';
          row.innerHTML = `
            <td>${label}</td>
            <td><span class="meta-chip">${best}</span></td>
            <td>${plays} plays</td>
            <td>${avg}</td>
            <td><span class="meta-chip">${status === 'good' ? '✓ Good' : '⚠ Improve'}</span></td>
          `;
          tbody.appendChild(row);
        });

        // Donuts (top 6 by plays)
        const donutGrid = document.getElementById('donut-grid');
        donutGrid.innerHTML='';
        const entries = Object.entries(progress || {})
          .sort((a,b)=> (b[1].total_games||0) - (a[1].total_games||0))
          .slice(0,6);
        entries.forEach(([game, stats], i) => {
          const label = LABEL_MAP[game] || capitalizeGame(game);
          const best = stats.best_score || 0;
          const maxScore = Math.max(best, 100);
          const pct = Math.min(best / maxScore, 1);
          const color = pct > 0.7 ? '#34d399' : pct > 0.4 ? '#fbbf24' : '#f87171';
          const id = `d${i+1}`;
          const card = document.createElement('div');
          card.className = 'card donut-card';
          card.innerHTML = `
            <div class="donut-wrap" style="position:relative;display:inline-flex;align-items:center;justify-content:center;">
              <canvas id="${id}" width="130" height="130"></canvas>
              <div class="donut-center">
                <div class="donut-score" style="color:${color}">${Math.round(best)}</div>
                <div class="donut-max">best</div>
              </div>
            </div>
            <div class="donut-label">${label}</div>
            <div class="donut-sub">${stats.total_games||0} plays</div>
          `;
          donutGrid.appendChild(card);
          makeDonut(id, pct * 100, color);
        });

        // Hero ring — scale to actual max score seen
        const maxSeen = Math.max(...history.map(h => h.score || 0), 100);
        const heroCtx = document.getElementById('heroRing').getContext('2d');
        const frac = Math.max(0, Math.min(1, avgScore / maxSeen));
        heroCtx.clearRect(0,0,180,180);
        heroCtx.beginPath(); heroCtx.arc(90,90,72,0,2*Math.PI); heroCtx.strokeStyle='rgba(56,139,253,0.1)'; heroCtx.lineWidth=10; heroCtx.stroke();
        const grad = heroCtx.createLinearGradient(18,90,162,90);
        grad.addColorStop(0,'#38bdf8'); grad.addColorStop(1,'#818cf8');
        heroCtx.beginPath(); heroCtx.arc(90,90,72,-Math.PI/2,-Math.PI/2 + frac*2*Math.PI);
        heroCtx.strokeStyle=grad; heroCtx.lineCap='round'; heroCtx.lineWidth=10; heroCtx.stroke();

        // Reveal sections
        document.getElementById('loading').style.display='none';
        document.getElementById('hero-section').style.display='block';
        document.getElementById('donut-section').style.display='block';
        document.getElementById('table-section').style.display='block';
      }catch(err){
        document.getElementById('loading').innerHTML = 'Error loading data. <a href="/dashboard">Try games</a>';
      }
    }

    function makeDonut(id, pct, color){
      const rem = Math.max(0, 100 - pct);
      new Chart(document.getElementById(id), {
        type: 'doughnut',
        data: { datasets: [{ data: [pct, rem], backgroundColor: [color+'cc', 'rgba(56,139,253,0.07)'], borderWidth: 0 }] },
        options: { cutout: '75%', plugins: { legend: { display: false }, tooltip: { enabled: false }}, animation: { duration: 900, easing: 'easeOutQuart' } }
      });
    }

    window.addEventListener('load', loadProgress);
  </script>
</body>
</html>
